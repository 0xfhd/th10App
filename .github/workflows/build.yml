name: Build Unified Dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          clang \
            -dynamiclib \
            -arch arm64 \
            -isysroot $SDK \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -ObjC \
            -framework UIKit \
            -framework Foundation \
            -framework QuartzCore \
            -framework CoreGraphics \
            -framework CoreFoundation \
            -O2 \
            -w \
            *.m \
            -install_name @rpath/UnifiedRealMerge.dylib \
            -o UnifiedRealMerge.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: UnifiedRealMerge
          path: UnifiedRealMerge.dylib