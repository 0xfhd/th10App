name: Build Unified Real Merge AR v3

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build real merged dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          clang \
            -dynamiclib \
            -arch arm64 \
            -isysroot $SDK \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -ObjC \
            -framework UIKit \
            -framework Foundation \
            -framework QuartzCore \
            -framework CoreGraphics \
            -framework Security \
            -framework CommonCrypto \
            -O2 \
            -w \
            UnifiedEntry.m \
            UnifiedMenu.m \
            UnifiedHub.m \
            UnifiedMiniWindow.m \
            UnifiedSpeed.m \
            BatAuth.m \
            AT10OverlayView.m \
            MikeFace.m \
            MicUnlock.m \
            AnimationBooster.m \
            -install_name @rpath/UnifiedRealMerge.dylib \
            -o UnifiedRealMerge.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: UnifiedRealMerge
          path: UnifiedRealMerge.dylib
