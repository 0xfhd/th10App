name: Build Unified Dylib

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)

          clang \
            -dynamiclib \
            -arch arm64 \
            -isysroot $SDK \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -ObjC \
            -framework UIKit \
            -framework Foundation \
            -framework QuartzCore \
            -framework CoreGraphics \
            -O2 \
            -w \
            UnifiedEntry.m \
            UnifiedMenu.m \
            UnifiedHub.m \
            AT10OverlayView.m \
            AT10OverlayWindow.m \
            AT10Injector.m \
            -install_name @rpath/UnifiedMilky.dylib \
            -o UnifiedMilky.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: UnifiedMilky
          path: UnifiedMilky.dylib