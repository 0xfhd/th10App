name: Build AT10 dylib

on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build dylib
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          clang -dynamiclib \
            -arch arm64 \
            -isysroot $SDK \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -framework UIKit \
            -framework Foundation \
            -framework QuartzCore \
            -framework CoreGraphics \
            -w \
            -O2 \
            AT10App/AT10OverlayView.m \
            AT10App/AT10Injector.m \
            AT10App/BatAuth.m \
            -install_name @rpath/auto10th.dylib \
            -o auto10th.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: auto10th-dylib
          path: auto10th.dylib