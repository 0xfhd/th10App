name: Build AT10 IPA

on: [push]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build IPA
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          
          # كمبايل كل الملفات
          clang \
            -arch arm64 \
            -isysroot $SDK \
            -miphoneos-version-min=14.0 \
            -fobjc-arc \
            -framework UIKit \
            -framework Foundation \
            -framework QuartzCore \
            -O2 \
            AT10App/main.m \
            AT10App/AppDelegate.m \
            AT10App/AT10OverlayView.m \
            -o AT10App_bin

          # إنشاء هيكل الـ .app
          mkdir -p Payload/AT10App.app

          cp AT10App_bin         Payload/AT10App.app/AT10App
          cp AT10App/Info.plist  Payload/AT10App.app/Info.plist
          chmod +x               Payload/AT10App.app/AT10App

          # ضغط IPA
          zip -r AT10App.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AT10App-IPA
          path: AT10App.ipa
